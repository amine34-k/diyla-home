<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Diyla Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <div class="admin-login">
    <div class="login-card">
      <a href="../index.html" class="logo"><img src="../assets/logo.png" alt="Diyla Home"></a>
      <p class="login-subtitle">Admin Dashboard</p>
      <div class="login-error" role="alert"></div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@diylahome.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>
      <p class="login-hint">Demo: <code>admin@diylahome.com</code> / <code>admin123</code></p>
      <p class="login-hint" style="margin-top:0.75rem"><a href="../index.html">← Back to Store</a></p>
    </div>
  </div>
  <script src="../js/auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
